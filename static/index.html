<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TaskTray</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-root: #080d14;
  --bg-card: #0c1520;
  --bg-input: #0f172a;
  --border: #1e293b;
  --border-hover: #334155;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --text-faint: #475569;
  --cyan: #00e5cc;
  --cyan-bg: rgba(0,229,204,0.12);
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.12);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.12);
  --orange: #f59e42;
  --orange-bg: rgba(245,158,66,0.12);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.12);
  --pink: #f472b6;
  --pink-bg: rgba(244,114,182,0.12);
  --red: #ef4444;
  --font-mono: 'IBM Plex Mono', 'Cascadia Code', 'Consolas', monospace;
  --font-sans: 'Outfit', 'Segoe UI', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-root);
  color: var(--text);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scrollbar ─────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* ── Header ────────────────────────────────── */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg-root); z-index: 50;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { color: var(--cyan); font-size: 20px; }
.logo-text { font-family: var(--font-mono); font-weight: 700; font-size: 15px; letter-spacing: 2px; }
.stats-bar {
  display: flex; gap: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
}
.stats-bar .num { font-weight: 600; }
.stats-bar .num.active { color: var(--cyan); }
.stats-bar .num.backlog { color: var(--text-muted); }
.stats-bar .num.done { color: var(--green); }
.stats-bar .num.focused { color: var(--yellow); }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn-icon {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 6px; width: 34px; height: 34px; font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.btn-icon:hover { border-color: var(--cyan); color: var(--cyan); }
.btn-icon.syncing { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.source-badges {
  display: flex; gap: 6px; font-family: var(--font-mono); font-size: 10px;
}
.source-badge {
  padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border);
}
.source-badge.disk { color: var(--cyan); border-color: rgba(0,229,204,0.3); }
.source-badge.obsidian { color: var(--purple); border-color: rgba(167,139,250,0.3); }
.source-badge.manual { color: var(--green); border-color: rgba(52,211,153,0.3); }

/* ── Quick Add ─────────────────────────────── */
.quick-add {
  padding: 12px 24px; border-bottom: 1px solid var(--border);
}
.quick-add-inner {
  display: flex; gap: 8px; align-items: center; background: var(--bg-card);
  border-radius: 10px; padding: 4px 4px 4px 14px; border: 1px solid var(--border);
  transition: border-color 0.15s;
}
.quick-add-inner:focus-within { border-color: var(--cyan); }
.quick-add select {
  background: transparent; border: none; color: var(--text-muted); font-family: var(--font-mono);
  font-size: 11px; outline: none; cursor: pointer;
}
.quick-add select option { background: var(--bg-card); }
.quick-add input {
  flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px;
  outline: none; font-family: var(--font-sans); padding: 8px 0; min-width: 0;
}
.quick-add input::placeholder { color: var(--text-faint); }
.quick-add-btn {
  background: var(--cyan); color: var(--bg-root); border: none; border-radius: 8px;
  width: 36px; height: 36px; font-size: 20px; font-weight: 700; cursor: pointer;
  flex-shrink: 0; transition: transform 0.1s;
}
.quick-add-btn:active { transform: scale(0.95); }
.quick-add-btn:disabled { opacity: 0.4; cursor: default; }

/* ── Nav ───────────────────────────────────── */
.nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 24px; gap: 12px; flex-wrap: wrap;
}
.view-tabs { display: flex; gap: 4px; }
.view-tab {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 6px; padding: 6px 16px; font-size: 12px; font-family: var(--font-mono);
  cursor: pointer; transition: all 0.15s;
}
.view-tab.active { background: var(--cyan-bg); color: var(--cyan); border-color: rgba(0,229,204,0.3); }
.filter-chips { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-chip {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 20px; padding: 4px 12px; font-size: 11px; font-family: var(--font-mono);
  cursor: pointer; transition: all 0.15s;
}
.filter-chip.active { background: var(--cyan-bg); color: var(--cyan); border-color: rgba(0,229,204,0.3); }

/* ── Content ───────────────────────────────── */
.content { padding: 0 24px 100px; }
.section-hint { color: var(--text-dim); font-size: 12px; margin-bottom: 14px; font-family: var(--font-mono); }
.empty { color: var(--text-faint); text-align: center; padding: 60px 20px; font-family: var(--font-mono); font-size: 13px; }

/* ── Board View ────────────────────────────── */
.board-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;
}
.board-col {
  background: var(--bg-card); border-radius: 10px; padding: 14px; min-height: 120px;
  border: 1px solid var(--border);
}
.col-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.col-dot { width: 8px; height: 8px; border-radius: 50%; }
.col-title {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
}
.col-count { margin-left: auto; font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }
.col-empty { color: var(--border-hover); font-size: 12px; text-align: center; padding: 24px; font-family: var(--font-mono); }

/* ── Cards ─────────────────────────────────── */
.card-list { display: flex; flex-direction: column; gap: 8px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }

.card {
  background: var(--bg-card); border-radius: 8px; padding: 12px 14px;
  border: 1px solid var(--border); border-left: 3px solid var(--cyan);
  cursor: pointer; transition: border-color 0.15s;
}
.card:hover { border-color: var(--border-hover); }
.card.compact { padding: 10px 12px; margin-bottom: 8px; }

.card-top { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
.focus-star {
  background: none; border: none; font-size: 16px; cursor: pointer; padding: 0;
  line-height: 1; flex-shrink: 0; margin-top: 1px; color: var(--border-hover);
  transition: color 0.1s;
}
.focus-star.active { color: var(--yellow); }
.card-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; flex: 1; }
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

.badge {
  font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: var(--font-mono);
  letter-spacing: 0.5px; white-space: nowrap;
}
.status-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: var(--font-mono);
  border: none; cursor: pointer; letter-spacing: 0.5px;
}
.source-indicator {
  font-size: 9px; padding: 2px 6px; border-radius: 10px; font-family: var(--font-mono);
  border: 1px solid var(--border); color: var(--text-faint); margin-left: auto;
}

.card-expanded {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
  animation: slideDown 0.15s ease;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.card-notes { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; font-family: var(--font-mono); }
.card-path { font-size: 10px; color: var(--text-faint); margin-bottom: 10px; font-family: var(--font-mono); word-break: break-all; }
.card-actions { display: flex; gap: 8px; }
.btn-sm {
  background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted);
  border-radius: 6px; padding: 4px 12px; font-size: 11px; cursor: pointer;
  font-family: var(--font-mono); transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--border-hover); }
.btn-sm.danger { border-color: rgba(239,68,68,0.2); color: var(--red); }
.btn-sm.danger:hover { border-color: var(--red); }

/* ── Done Section ──────────────────────────── */
.done-section {
  margin: 20px 24px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card);
}
.done-section summary {
  padding: 10px 14px; cursor: pointer; font-size: 12px; color: var(--text-dim);
  font-family: var(--font-mono); list-style: none;
}
.done-section summary::marker { display: none; }
.done-list { padding: 0 14px 14px; }
.done-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid rgba(30,41,59,0.3);
}
.done-title { font-size: 12px; color: var(--text-faint); text-decoration: line-through; }

/* ── FAB ───────────────────────────────────── */
.fab {
  position: fixed; bottom: 24px; right: 24px; background: var(--cyan); color: var(--bg-root);
  border: none; border-radius: 12px; padding: 12px 20px; font-weight: 700; font-size: 14px;
  cursor: pointer; font-family: var(--font-mono); box-shadow: 0 4px 24px rgba(0,229,204,0.3);
  z-index: 40; transition: transform 0.1s;
}
.fab:active { transform: scale(0.96); }

/* ── Modal ─────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex;
  align-items: flex-end; justify-content: center; z-index: 100;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-card); border-radius: 16px 16px 0 0; padding: 24px 20px 32px;
  width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto;
  border: 1px solid var(--border); animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; font-family: var(--font-mono); }
.modal input[type="text"], .modal textarea {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; color: var(--text); font-size: 14px; margin-bottom: 10px; outline: none;
  font-family: var(--font-sans); transition: border-color 0.15s;
}
.modal textarea { font-family: var(--font-mono); font-size: 13px; resize: vertical; margin-bottom: 14px; }
.modal input:focus, .modal textarea:focus { border-color: var(--cyan); }
.modal-row { margin-bottom: 14px; }
.modal-label {
  font-size: 11px; color: var(--text-dim); font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block;
}
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 20px; padding: 4px 12px; font-size: 11px; cursor: pointer;
  font-family: var(--font-mono); transition: all 0.15s;
}
.chip.active { border-width: 1.5px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; align-items: center; }
.btn-cancel {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer;
}
.btn-save {
  background: var(--cyan); color: var(--bg-root); border: none; border-radius: 8px;
  padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
}
.btn-save:disabled { opacity: 0.4; }
.btn-delete {
  background: transparent; border: 1px solid rgba(239,68,68,0.3); color: var(--red);
  border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer;
}

/* ── Toast ─────────────────────────────────── */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--bg-card); color: var(--cyan); padding: 10px 24px; border-radius: 8px;
  font-size: 12px; font-family: var(--font-mono); z-index: 999;
  border: 1px solid rgba(0,229,204,0.2); box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.2s ease;
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, -8px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* ── Responsive ────────────────────────────── */
@media (max-width: 640px) {
  .header { padding: 12px 16px; flex-direction: column; gap: 8px; align-items: flex-start; }
  .header-right { display: flex; gap: 8px; width: 100%; justify-content: space-between; align-items: center; }
  .stats-bar { gap: 10px; }
  .quick-add { padding: 10px 16px; }
  .nav { padding: 10px 16px; }
  .content { padding: 0 16px 100px; }
  .board-grid { grid-template-columns: 1fr; }
  .card-grid { grid-template-columns: 1fr; }
  .done-section { margin: 16px 16px 0; }
}
</style>
</head>
<body>

<div id="app"></div>

<script>
const API = '';  // same origin

const CATEGORIES = [
  { id: 'dev', label: 'Dev', color: '#00e5cc', bg: 'rgba(0,229,204,0.12)' },
  { id: 'trading', label: 'Trading', color: '#f59e42', bg: 'rgba(245,158,66,0.12)' },
  { id: 'teaching', label: 'Teaching', color: '#a78bfa', bg: 'rgba(167,139,250,0.12)' },
  { id: 'ideas', label: 'Ideas', color: '#34d399', bg: 'rgba(52,211,153,0.12)' },
  { id: 'personal', label: 'Personal', color: '#f472b6', bg: 'rgba(244,114,182,0.12)' },
  { id: 'learning', label: 'Learning', color: '#94a3b8', bg: 'rgba(148,163,184,0.12)' },
];
const STATUS_OPTS = [
  { id: 'active', label: 'Active', color: '#00e5cc' },
  { id: 'paused', label: 'Paused', color: '#fbbf24' },
  { id: 'backlog', label: 'Backlog', color: '#94a3b8' },
  { id: 'done', label: 'Done', color: '#34d399' },
];
const PRIORITY_OPTS = [
  { id: 'p0', label: 'P0', color: '#ef4444' },
  { id: 'p1', label: 'P1', color: '#f59e42' },
  { id: 'p2', label: 'P2', color: '#fbbf24' },
  { id: 'p3', label: 'P3', color: '#94a3b8' },
];
const SOURCE_LABELS = { disk: '⬡ disk', obsidian: '◈ obsidian', manual: '✎ manual' };

function getCat(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[0]; }
function getStatus(id) { return STATUS_OPTS.find(s => s.id === id) || STATUS_OPTS[2]; }
function getPriority(id) { return PRIORITY_OPTS.find(p => p.id === id) || PRIORITY_OPTS[2]; }

// ── State ───────────────────────────────────
let state = {
  items: [],
  stats: {},
  view: 'board',
  filter: 'all',
  expanded: null,
  showModal: false,
  editItem: null,
  syncing: false,
  toast: null,
  form: { title: '', category: 'dev', status: 'backlog', priority: 'p2', notes: '', focused: false },
};

// ── API ─────────────────────────────────────
async function fetchItems() {
  try {
    const res = await fetch(API + '/api/items');
    state.items = await res.json();
    render();
  } catch(e) { console.error('Fetch failed:', e); }
}
async function fetchStats() {
  try {
    const res = await fetch(API + '/api/stats');
    state.stats = await res.json();
    render();
  } catch(e) {}
}
async function addItem(data) {
  await fetch(API + '/api/items', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  await fetchItems(); await fetchStats();
}
async function updateItem(id, data) {
  await fetch(API + '/api/items/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  await fetchItems(); await fetchStats();
}
async function deleteItem(id) {
  await fetch(API + '/api/items/' + id, { method: 'DELETE' });
  await fetchItems(); await fetchStats();
}
async function triggerSync() {
  state.syncing = true; render();
  try {
    await fetch(API + '/api/sync', { method: 'POST' });
    await fetchItems(); await fetchStats();
    showToast('Synced');
  } catch(e) { showToast('Sync failed'); }
  state.syncing = false; render();
}

function showToast(msg) {
  state.toast = msg; render();
  setTimeout(() => { state.toast = null; render(); }, 2200);
}

// ── Render ───────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const { items, stats, view, filter, expanded, showModal, toast } = state;
  const filtered = filter === 'all' ? items : items.filter(i => i.category === filter);
  const focusedItems = items.filter(i => i.focused && i.status !== 'done');
  const doneItems = items.filter(i => i.status === 'done');

  let html = '';

  // Toast
  if (toast) html += `<div class="toast">${esc(toast)}</div>`;

  // Header
  html += `<header class="header">
    <div>
      <div class="logo"><span class="logo-icon">◆</span><span class="logo-text">TASKTRAY</span></div>
      <div class="stats-bar" style="margin-top:4px">
        <span><span class="num active">${stats.active||0}</span> active</span>
        <span><span class="num backlog">${stats.backlog||0}</span> backlog</span>
        <span><span class="num done">${stats.done||0}</span> done</span>
        <span><span class="num focused">${stats.focused||0}</span> focused</span>
      </div>
    </div>
    <div class="header-right">
      <div class="source-badges">
        <span class="source-badge disk">${stats.by_source?.disk||0} disk</span>
        <span class="source-badge obsidian">${stats.by_source?.obsidian||0} obsidian</span>
        <span class="source-badge manual">${stats.by_source?.manual||0} manual</span>
      </div>
      <button class="btn-icon ${state.syncing?'syncing':''}" onclick="triggerSync()" title="Sync now">⟳</button>
    </div>
  </header>`;

  // Quick add
  html += `<div class="quick-add"><div class="quick-add-inner">
    <select id="qa-cat">${CATEGORIES.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}</select>
    <input id="qa-input" placeholder="Quick capture — type anything..." onkeydown="if(event.key==='Enter')quickAdd()">
    <button class="quick-add-btn" onclick="quickAdd()">+</button>
  </div></div>`;

  // Nav
  html += `<div class="nav">
    <div class="view-tabs">
      ${['board','list','focus'].map(v =>
        `<button class="view-tab ${view===v?'active':''}" onclick="setView('${v}')">${v.charAt(0).toUpperCase()+v.slice(1)}${v==='focus'&&focusedItems.length?' ('+focusedItems.length+')':''}</button>`
      ).join('')}
    </div>
    <div class="filter-chips">
      <button class="filter-chip ${filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      ${CATEGORIES.map(c =>
        `<button class="filter-chip ${filter===c.id?'active':''}" style="${filter===c.id?`background:${c.bg};color:${c.color};border-color:${c.color}`:''}" onclick="setFilter('${c.id}')">${c.label}</button>`
      ).join('')}
    </div>
  </div>`;

  // FAB
  html += `<button class="fab" onclick="openAdd()">+ New Item</button>`;

  // Content
  html += `<div class="content">`;

  if (view === 'focus') {
    html += `<p class="section-hint">★ Pinned items for today's focus</p>`;
    if (focusedItems.length === 0) html += `<p class="empty">No items in focus. Star items to pin them here.</p>`;
    else {
      html += `<div class="card-grid">`;
      focusedItems.forEach(i => { html += renderCard(i, false); });
      html += `</div>`;
    }
  }

  if (view === 'board') {
    html += `<div class="board-grid">`;
    STATUS_OPTS.filter(s=>s.id!=='done').forEach(status => {
      const colItems = filtered.filter(i=>i.status===status.id)
        .sort((a,b) => ['p0','p1','p2','p3'].indexOf(a.priority) - ['p0','p1','p2','p3'].indexOf(b.priority));
      html += `<div class="board-col">
        <div class="col-header">
          <span class="col-dot" style="background:${status.color}"></span>
          <span class="col-title">${status.label}</span>
          <span class="col-count">${colItems.length}</span>
        </div>`;
      if (colItems.length === 0) html += `<p class="col-empty">No items</p>`;
      colItems.forEach(i => { html += renderCard(i, true); });
      html += `</div>`;
    });
    html += `</div>`;
  }

  if (view === 'list') {
    const sorted = [...filtered].sort((a,b) => {
      const so = ['active','paused','backlog','done'];
      const po = ['p0','p1','p2','p3'];
      if (so.indexOf(a.status) !== so.indexOf(b.status)) return so.indexOf(a.status) - so.indexOf(b.status);
      return po.indexOf(a.priority) - po.indexOf(b.priority);
    });
    if (sorted.length === 0) html += `<p class="empty">No items found.</p>`;
    else {
      html += `<div class="card-list">`;
      sorted.forEach(i => { html += renderCard(i, false); });
      html += `</div>`;
    }
  }

  html += `</div>`;

  // Done section
  if (view !== 'focus' && doneItems.length > 0) {
    html += `<details class="done-section"><summary>▸ Completed (${doneItems.length})</summary><div class="done-list">`;
    doneItems.forEach(i => {
      html += `<div class="done-item"><span class="done-title">${esc(i.title)}</span><button class="btn-icon" style="width:24px;height:24px;font-size:14px" onclick="deleteItem('${i.id}')">×</button></div>`;
    });
    html += `</div></details>`;
  }

  // Modal
  if (showModal) html += renderModal();

  app.innerHTML = html;
}

function renderCard(item, compact) {
  const cat = getCat(item.category);
  const status = getStatus(item.status);
  const pri = getPriority(item.priority);
  const isExpanded = state.expanded === item.id;
  const sourceLabel = SOURCE_LABELS[item.source] || item.source;

  let html = `<div class="card ${compact?'compact':''}" style="border-left-color:${cat.color}" onclick="toggleExpand('${item.id}')">
    <div class="card-top">
      <button class="focus-star ${item.focused?'active':''}" onclick="event.stopPropagation();toggleFocus('${item.id}')">${item.focused?'★':'☆'}</button>
      <span class="card-title">${esc(item.title)}</span>
    </div>
    <div class="card-meta">
      <span class="badge" style="background:${cat.bg};color:${cat.color}">${cat.label}</span>
      <span class="badge" style="background:${pri.color}18;color:${pri.color};font-weight:600">${pri.label}</span>
      <button class="status-badge" style="background:${status.color}22;color:${status.color}" onclick="event.stopPropagation();cycleStatus('${item.id}')">${status.label}</button>
      <span class="source-indicator">${sourceLabel}</span>
    </div>`;

  if (isExpanded) {
    html += `<div class="card-expanded" onclick="event.stopPropagation()">`;
    if (item.notes) html += `<p class="card-notes">${esc(item.notes)}</p>`;
    if (item.path) html += `<p class="card-path">${esc(item.path)}</p>`;
    if (item.type) html += `<p class="card-path" style="margin-top:2px">Type: ${esc(item.type)}</p>`;
    html += `<div class="card-actions">
      <button class="btn-sm" onclick="openEdit('${item.id}')">Edit</button>
      <button class="btn-sm danger" onclick="deleteItem('${item.id}')">Delete</button>
    </div></div>`;
  }

  html += `</div>`;
  return html;
}

function renderModal() {
  const { form, editItem } = state;
  let html = `<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <h3 class="modal-title">${editItem ? 'Edit Item' : 'Add New Item'}</h3>
    <input type="text" id="fm-title" placeholder="Title" value="${esc(form.title)}" oninput="state.form.title=this.value">
    <textarea id="fm-notes" placeholder="Notes (optional)" rows="3" oninput="state.form.notes=this.value">${esc(form.notes)}</textarea>
    <div class="modal-row"><label class="modal-label">Category</label><div class="chip-row">
      ${CATEGORIES.map(c => `<button class="chip ${form.category===c.id?'active':''}" style="${form.category===c.id?`background:${c.bg};color:${c.color};border-color:${c.color}`:''}" onclick="state.form.category='${c.id}';render()">${c.label}</button>`).join('')}
    </div></div>
    <div class="modal-row"><label class="modal-label">Status</label><div class="chip-row">
      ${STATUS_OPTS.map(s => `<button class="chip ${form.status===s.id?'active':''}" style="${form.status===s.id?`background:${s.color}22;color:${s.color};border-color:${s.color}`:''}" onclick="state.form.status='${s.id}';render()">${s.label}</button>`).join('')}
    </div></div>
    <div class="modal-row"><label class="modal-label">Priority</label><div class="chip-row">
      ${PRIORITY_OPTS.map(p => `<button class="chip ${form.priority===p.id?'active':''}" style="${form.priority===p.id?`background:${p.color}22;color:${p.color};border-color:${p.color}`:''}" onclick="state.form.priority='${p.id}';render()">${p.label}</button>`).join('')}
    </div></div>
    <div class="modal-row">
      <label class="modal-label" style="cursor:pointer;display:flex;align-items:center;gap:8px" onclick="state.form.focused=!state.form.focused;render()">
        <span style="color:${form.focused?'#fbbf24':'#475569'};font-size:18px">${form.focused?'★':'☆'}</span> Daily Focus
      </label>
    </div>
    <div class="modal-actions">
      ${editItem ? `<button class="btn-delete" onclick="deleteItem('${editItem.id}');closeModal()">Delete</button>` : ''}
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveItem()">Save</button>
    </div>
  </div></div>`;
  return html;
}

// ── Actions ─────────────────────────────────
function setView(v) { state.view = v; state.expanded = null; render(); }
function setFilter(f) { state.filter = f; render(); }
function toggleExpand(id) { state.expanded = state.expanded === id ? null : id; render(); }

async function toggleFocus(id) {
  const item = state.items.find(i => i.id === id);
  if (item) await updateItem(id, { focused: !item.focused });
}
async function cycleStatus(id) {
  const order = ['backlog','active','paused','done'];
  const item = state.items.find(i => i.id === id);
  if (item) {
    const idx = order.indexOf(item.status);
    await updateItem(id, { status: order[(idx+1) % order.length] });
  }
}

function openAdd() {
  state.form = { title: '', category: 'dev', status: 'backlog', priority: 'p2', notes: '', focused: false };
  state.editItem = null; state.showModal = true; render();
  setTimeout(() => document.getElementById('fm-title')?.focus(), 100);
}
function openEdit(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  state.form = { title: item.title, category: item.category, status: item.status, priority: item.priority, notes: item.notes || '', focused: !!item.focused };
  state.editItem = item; state.showModal = true; render();
}
function closeModal() { state.showModal = false; state.editItem = null; render(); }

async function saveItem() {
  const { form, editItem } = state;
  if (!form.title.trim()) return;
  if (editItem) {
    await updateItem(editItem.id, { ...form });
    showToast('Updated');
  } else {
    await addItem({ ...form });
    showToast('Added');
  }
  closeModal();
}

async function quickAdd() {
  const input = document.getElementById('qa-input');
  const cat = document.getElementById('qa-cat');
  if (!input || !input.value.trim()) return;
  await addItem({ title: input.value.trim(), category: cat.value, status: 'backlog', priority: 'p2', notes: '', focused: false });
  input.value = '';
  showToast('Added to backlog');
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Init ────────────────────────────────────
(async function init() {
  await fetchItems();
  await fetchStats();
  // Auto-refresh every 30s
  setInterval(async () => { await fetchItems(); await fetchStats(); }, 30000);
})();
</script>
</body>
</html>
